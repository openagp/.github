<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-label="OpenAGP — Agent Governance Protocol">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fafbff"/>
      <stop offset="100%" stop-color="#eef1fa"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <circle cx="640" cy="180" r="320" fill="url(#glow)"/>

  <g opacity="0.06" stroke="#0a0e1a" stroke-width="1">
    <path d="M0 90 H1280 M0 180 H1280 M0 270 H1280"/>
    <path d="M213 0 V360 M427 0 V360 M640 0 V360 M853 0 V360 M1067 0 V360"/>
  </g>

  <g transform="translate(80, 96)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#5a6580" letter-spacing="2">
    <text x="0" y="0">FLOW A · EVENTS</text>
    <line x1="160" y1="-4" x2="320" y2="-4" stroke="#2563eb" stroke-width="2"/>
    <polygon points="320,-8 332,-4 320,0" fill="#2563eb"/>

    <text x="0" y="36">FLOW B · POLICY</text>
    <line x1="320" y1="32" x2="160" y2="32" stroke="#7c3aed" stroke-width="2"/>
    <polygon points="160,28 148,32 160,36" fill="#7c3aed"/>

    <text x="0" y="72">FLOW C · DECISIONS</text>
    <line x1="160" y1="68" x2="280" y2="68" stroke="#d97706" stroke-width="2"/>
    <polygon points="280,64 292,68 280,72" fill="#d97706"/>
    <line x1="292" y1="68" x2="320" y2="68" stroke="#d97706" stroke-width="2" stroke-dasharray="2,3"/>
    <line x1="320" y1="68" x2="200" y2="68" stroke="#d97706" stroke-width="2"/>
    <polygon points="200,64 188,68 200,72" fill="#d97706"/>
  </g>

  <text x="640" y="92" text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, system-ui, sans-serif"
        font-size="13" font-weight="600" letter-spacing="6" fill="#5a6580">
    OPEN  ·  VENDOR-NEUTRAL  ·  VERIFIABLE
  </text>

  <text x="640" y="200" text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, system-ui, 'Inter', sans-serif"
        font-size="112" font-weight="800" letter-spacing="-3" fill="#0a0e1a">
    Open<tspan fill="url(#accent)">AGP</tspan>
  </text>

  <text x="640" y="248" text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, system-ui, sans-serif"
        font-size="22" font-weight="400" fill="#3a4566">
    The Agent Governance Protocol
  </text>

  <g transform="translate(640, 296)" text-anchor="middle"
     font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#5a6580">
    <text x="-160" y="0" font-weight="600" fill="#2563eb">L1</text>
    <text x="-160" y="20">events</text>
    <text x="0" y="0" font-weight="600" fill="#7c3aed">L2</text>
    <text x="0" y="20">policy</text>
    <text x="160" y="0" font-weight="600" fill="#d97706">L3</text>
    <text x="160" y="20">decisions</text>
  </g>
</svg>
