<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-label="OpenAGP — Agent Governance Protocol">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#11172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <circle cx="640" cy="180" r="320" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <path d="M0 90 H1280 M0 180 H1280 M0 270 H1280"/>
    <path d="M213 0 V360 M427 0 V360 M640 0 V360 M853 0 V360 M1067 0 V360"/>
  </g>

  <!-- protocol-flow motif: 3 horizontal tracks with arrows, suggesting flows A/B/C -->
  <g transform="translate(80, 96)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#7280a8" letter-spacing="2">
    <text x="0" y="0">FLOW A · EVENTS</text>
    <line x1="160" y1="-4" x2="320" y2="-4" stroke="#3b82f6" stroke-width="2"/>
    <polygon points="320,-8 332,-4 320,0" fill="#3b82f6"/>

    <text x="0" y="36">FLOW B · POLICY</text>
    <line x1="320" y1="32" x2="160" y2="32" stroke="#a855f7" stroke-width="2"/>
    <polygon points="160,28 148,32 160,36" fill="#a855f7"/>

    <text x="0" y="72">FLOW C · DECISIONS</text>
    <line x1="160" y1="68" x2="280" y2="68" stroke="#f59e0b" stroke-width="2"/>
    <polygon points="280,64 292,68 280,72" fill="#f59e0b"/>
    <line x1="292" y1="68" x2="320" y2="68" stroke="#f59e0b" stroke-width="2" stroke-dasharray="2,3"/>
    <line x1="320" y1="68" x2="200" y2="68" stroke="#f59e0b" stroke-width="2"/>
    <polygon points="200,64 188,68 200,72" fill="#f59e0b"/>
  </g>

  <!-- top eyebrow tag -->
  <text x="640" y="92" text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, system-ui, sans-serif"
        font-size="13" font-weight="600" letter-spacing="6" fill="#8aa0d0">
    OPEN  ·  VENDOR-NEUTRAL  ·  VERIFIABLE
  </text>

  <!-- wordmark -->
  <text x="640" y="200" text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, system-ui, 'Inter', sans-serif"
        font-size="112" font-weight="800" letter-spacing="-3" fill="#ffffff">
    Open<tspan fill="url(#accent)">AGP</tspan>
  </text>

  <!-- subtitle -->
  <text x="640" y="248" text-anchor="middle"
        font-family="ui-sans-serif, -apple-system, system-ui, sans-serif"
        font-size="22" font-weight="400" fill="#b8c5e8">
    The Agent Governance Protocol
  </text>

  <!-- bottom rule with conformance markers -->
  <g transform="translate(640, 296)" text-anchor="middle"
     font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#8aa0d0">
    <text x="-160" y="0" font-weight="600" fill="#3b82f6">L1</text>
    <text x="-160" y="20">events</text>
    <text x="0" y="0" font-weight="600" fill="#a855f7">L2</text>
    <text x="0" y="20">policy</text>
    <text x="160" y="0" font-weight="600" fill="#f59e0b">L3</text>
    <text x="160" y="20">decisions</text>
  </g>
</svg>
